<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <title>MSaaS – Music Separation as a Service</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --accent: #38bdf8;
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.85);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background-color: var(--bg-color);
            background-image:
                radial-gradient(ellipse 80% 50% at 20% 0%, rgba(139, 92, 246, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 90% 80%, rgba(56, 189, 248, 0.15) 0%, transparent 50%);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            min-height: 100vh;
            line-height: 1.5;
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #a78bfa 0%, #38bdf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0 0 0.35rem 0;
        }

        .tagline {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 400;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            display: grid;
            gap: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1rem;
            padding: 1.75rem;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            border-color: rgba(255, 255, 255, 0.12);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
        }

        h2 {
            margin: 0 0 1rem 0;
            font-size: 1.15rem;
            font-weight: 600;
            color: #e2e8f0;
            letter-spacing: -0.01em;
        }

        .card > h2 {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .upload-zone {
            border: 2px dashed rgba(255,255,255,0.18);
            border-radius: 0.75rem;
            padding: 2.5rem 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            margin-bottom: 1rem;
            color: var(--text-muted);
        }

        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--primary);
            background: rgba(139, 92, 246, 0.08);
            color: var(--text-main);
        }

        .upload-zone .upload-icon {
            margin-bottom: 0.5rem;
            opacity: 0.85;
        }

        .upload-zone .upload-icon svg {
            width: 48px;
            height: 48px;
            display: block;
            margin: 0 auto;
        }

        .icon {
            width: 1.25em;
            height: 1.25em;
            vertical-align: -0.25em;
            margin-right: 0.35rem;
            flex-shrink: 0;
        }

        .icon-sm {
            width: 1em;
            height: 1em;
            vertical-align: -0.2em;
            margin-right: 0.25rem;
        }

        .btn-icon {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
        }

        #fileInput {
            display: none;
        }

        button {
            background: linear-gradient(180deg, var(--primary) 0%, var(--primary-hover) 100%);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: filter 0.2s, transform 0.1s;
            width: 100%;
            box-shadow: 0 2px 8px rgba(139, 92, 246, 0.35);
        }

        button:hover:not(:disabled) {
            filter: brightness(1.08);
        }

        button:active:not(:disabled) {
            transform: scale(0.99);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .list-group {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .list-item {
            padding: 1rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .list-item.text-muted {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .hash-text {
            font-family: ui-monospace, monospace;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .track-links {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }

        .track-links a {
            background: rgba(255,255,255,0.08);
            color: var(--text-main);
            text-decoration: none;
            padding: 0.35rem 0.65rem;
            border-radius: 0.35rem;
            font-size: 0.8rem;
            font-weight: 500;
            transition: background 0.2s, color 0.2s;
        }

        .track-links a:hover {
            background: var(--primary);
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #status {
            margin-top: 1rem;
            padding: 0.6rem;
            text-align: center;
            color: var(--accent);
            font-weight: 500;
            font-size: 0.95rem;
            min-height: 1.5em;
        }

        #status:empty { display: none; }
    </style>
</head>
<body>

    <header class="header">
        <h1><span aria-hidden="true" style="display:inline-block;vertical-align:middle;margin-right:0.25rem">🎵</span> Music Separation Service</h1>
        <p class="tagline">Upload an MP3 · Get stems (vocals, bass, drums, other)</p>
    </header>

    <div class="container">
        <!-- Upload Section -->
        <div class="card">
            <h2>
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                Upload Song
            </h2>
            <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/></svg>
                </div>
                <p id="uploadText">Drag & drop an MP3 here or click to browse</p>
                <input type="file" id="fileInput" accept="audio/mpeg">
            </div>
            <button id="uploadBtn" disabled onclick="uploadFile()">
                <span class="btn-icon">
                    <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83M19.07 4.93l-2.83 2.83M7.76 16.24l-2.83 2.83"/><circle cx="12" cy="12" r="3"/></svg>
                    Separate Tracks
                </span>
            </button>
            <div id="status"></div>
        </div>

        <!-- Queue Section -->
        <div class="card">
            <h2>
                <span style="display:inline-flex;align-items:center;">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                    Processing Queue
                </span>
                <button class="btn-icon" style="width:auto;padding:0.35rem 0.65rem;font-size:0.8rem;margin-left:auto" onclick="fetchQueue()">
                    <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                    Refresh
                </button>
            </h2>
            <ul class="list-group" id="queueList">
                <li class="list-item text-muted">No jobs in queue</li>
            </ul>
        </div>

        <!-- Completed Tracks -->
        <div class="card">
            <h2>
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><polyline points="17 11 12 16 7 11"/></svg>
                My Separated Tracks
            </h2>
            <ul class="list-group" id="tracksList">
                <li class="list-item text-muted">No completed tracks found</li>
            </ul>
        </div>
    </div>

    <script>
        let selectedFile = null;

        // UI Elements
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const uploadText = document.getElementById('uploadText');
        const uploadBtn = document.getElementById('uploadBtn');
        const statusDiv = document.getElementById('status');
        const queueList = document.getElementById('queueList');
        const tracksList = document.getElementById('tracksList');

        // Drag & Drop Handlers
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                handleFileSelect(e.dataTransfer.files[0]);
            }
        });

        // File Input Handler
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                handleFileSelect(e.target.files[0]);
            }
        });

        function handleFileSelect(file) {
            if (file.type !== "audio/mpeg" && !file.name.endsWith('.mp3')) {
                alert("Please select a valid MP3 file.");
                return;
            }
            selectedFile = file;
            uploadText.innerText = `Selected: ${file.name}`;
            uploadBtn.disabled = false;
        }

        function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => {
                    // Remove "data:audio/mpeg;base64," part
                    const base64String = reader.result.split(',')[1];
                    resolve(base64String);
                };
                reader.onerror = error => reject(error);
            });
        }

        async function uploadFile() {
            if (!selectedFile) return;

            uploadBtn.disabled = true;
            statusDiv.innerText = "Encoding file...";
            
            try {
                const base64Data = await getBase64(selectedFile);
                statusDiv.innerText = "Uploading to server...";

                const response = await fetch('/apiv1/separate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        mp3: base64Data,
                        callback: {} 
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    statusDiv.innerText = "✓ Song enqueued! Hash: " + data.hash.substring(0, 8) + "...";
                    selectedFile = null;
                    uploadText.innerText = "Drag & Drop an MP3 here or click to browse";
                    
                    // Save hash to local storage to track
                    let hashes = JSON.parse(localStorage.getItem('myHashes') || '[]');
                    if (!hashes.includes(data.hash)) {
                        hashes.push(data.hash);
                        localStorage.setItem('myHashes', JSON.stringify(hashes));
                    }
                    // Track when we submitted (so we can show "Processing" for a while)
                    let submittedAt = JSON.parse(localStorage.getItem('submittedAt') || '{}');
                    submittedAt[data.hash] = Date.now();
                    localStorage.setItem('submittedAt', JSON.stringify(submittedAt));

                    fetchQueue();
                    renderMyTracks();
                } else {
                    statusDiv.innerText = "Error: " + (data.error || "Failed to enqueue");
                }
            } catch (err) {
                statusDiv.innerText = "Error: " + err.message;
            }
            uploadBtn.disabled = false;
        }

        const PROCESSING_SHOW_MS = 15 * 60 * 1000; // show as "Processing" for 15 min after submit

        async function fetchQueue() {
            try {
                const response = await fetch('/apiv1/queue');
                const data = await response.json();
                const waiting = (data.queue && Array.isArray(data.queue)) ? data.queue : [];
                const submittedAt = JSON.parse(localStorage.getItem('submittedAt') || '{}');
                const now = Date.now();
                const processing = Object.entries(submittedAt)
                    .filter(([hash, ts]) => (now - ts) < PROCESSING_SHOW_MS && !waiting.includes(hash))
                    .map(([hash]) => hash);

                queueList.innerHTML = '';
                if (waiting.length === 0 && processing.length === 0) {
                    queueList.innerHTML = '<li class="list-item text-muted">No jobs in queue</li>';
                } else {
                    waiting.forEach(hash => {
                        queueList.innerHTML += `
                            <li class="list-item">
                                <span><span class="hash-text">${hash.substring(0, 8)}...</span> Waiting</span>
                                <div class="spinner"></div>
                            </li>`;
                    });
                    processing.forEach(hash => {
                        queueList.innerHTML += `
                            <li class="list-item">
                                <span><span class="hash-text">${hash.substring(0, 8)}...</span> Processing</span>
                                <div class="spinner"></div>
                            </li>`;
                    });
                }
            } catch (err) {
                console.error("Failed to fetch queue", err);
                queueList.innerHTML = '<li class="list-item text-muted">Could not load queue</li>';
            }
        }

        function renderMyTracks() {
            let hashes = JSON.parse(localStorage.getItem('myHashes') || '[]');
            tracksList.innerHTML = '';

            if (hashes.length === 0) {
                tracksList.innerHTML = '<li class="list-item text-muted">No completed tracks found</li>';
                return;
            }

            const trackLabels = [
                { file: 'vocals.mp3', label: '🎤 Vocals' },
                { file: 'bass.mp3', label: '🎸 Bass' },
                { file: 'drums.mp3', label: '🥁 Drums' },
                { file: 'other.mp3', label: '🎹 Other' }
            ];
            hashes.forEach(hash => {
                let linksHtml = trackLabels.map(({ file, label }) => `<a href="/apiv1/track/${hash}/${file}" target="_blank">${label}</a>`).join('');

                tracksList.innerHTML += `
                    <li class="list-item" style="flex-direction: column; align-items: flex-start;">
                        <strong>Hash: <span class="hash-text">${hash.substring(0, 16)}...</span></strong>
                        <div class="track-links">
                            ${linksHtml}
                        </div>
                    </li>`;
            });
        }

        // Init
        fetchQueue();
        renderMyTracks();
        
        // Auto refresh
        setInterval(fetchQueue, 5000);
    </script>
</body>
</html>
