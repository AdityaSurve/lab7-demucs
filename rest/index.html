<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSaaS - Music Separation as a Service</title>
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(56, 189, 248, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            background: linear-gradient(to right, #a78bfa, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            display: grid;
            gap: 2rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s;
        }

        h2 {
            margin-top: 0;
            font-size: 1.5rem;
            color: #e2e8f0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 0.5rem;
        }

        .upload-zone {
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 0.5rem;
            padding: 3rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 1rem;
        }

        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--primary);
            background: rgba(139, 92, 246, 0.1);
        }

        #fileInput {
            display: none;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
        }

        button:hover:not(:disabled) {
            background-color: var(--primary-hover);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .list-group {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .list-item {
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .hash-text {
            font-family: monospace;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        
        .track-links {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }

        .track-links a {
            background: rgba(255,255,255,0.1);
            color: var(--text-main);
            text-decoration: none;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.8rem;
            transition: background 0.2s;
        }

        .track-links a:hover {
            background: var(--primary);
        }

        #status {
            margin-top: 1rem;
            text-align: center;
            color: #38bdf8;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <h1>Music Separation Service</h1>

    <div class="container">
        <!-- Upload Section -->
        <div class="card">
            <h2>Upload Song</h2>
            <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <p id="uploadText">Drag & Drop an MP3 here or click to browse</p>
                <input type="file" id="fileInput" accept="audio/mpeg">
            </div>
            <button id="uploadBtn" disabled onclick="uploadFile()">Separate Tracks</button>
            <div id="status"></div>
        </div>

        <!-- Queue Section -->
        <div class="card">
            <h2>Processing Queue <button style="width:auto; padding:0.25rem 0.5rem; float:right; font-size:0.8rem" onclick="fetchQueue()">Refresh</button></h2>
            <ul class="list-group" id="queueList">
                <li class="list-item text-muted">No jobs in queue</li>
            </ul>
        </div>

        <!-- Completed Tracks (Simulated by checking localStorage hashes) -->
        <div class="card">
            <h2>My Separated Tracks</h2>
            <ul class="list-group" id="tracksList">
                <li class="list-item text-muted">No completed tracks found</li>
            </ul>
        </div>
    </div>

    <script>
        let selectedFile = null;

        // UI Elements
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const uploadText = document.getElementById('uploadText');
        const uploadBtn = document.getElementById('uploadBtn');
        const statusDiv = document.getElementById('status');
        const queueList = document.getElementById('queueList');
        const tracksList = document.getElementById('tracksList');

        // Drag & Drop Handlers
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                handleFileSelect(e.dataTransfer.files[0]);
            }
        });

        // File Input Handler
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                handleFileSelect(e.target.files[0]);
            }
        });

        function handleFileSelect(file) {
            if (file.type !== "audio/mpeg" && !file.name.endsWith('.mp3')) {
                alert("Please select a valid MP3 file.");
                return;
            }
            selectedFile = file;
            uploadText.innerText = `Selected: ${file.name}`;
            uploadBtn.disabled = false;
        }

        function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => {
                    // Remove "data:audio/mpeg;base64," part
                    const base64String = reader.result.split(',')[1];
                    resolve(base64String);
                };
                reader.onerror = error => reject(error);
            });
        }

        async function uploadFile() {
            if (!selectedFile) return;

            uploadBtn.disabled = true;
            statusDiv.innerText = "Encoding file...";
            
            try {
                const base64Data = await getBase64(selectedFile);
                statusDiv.innerText = "Uploading to server...";

                const response = await fetch('/apiv1/separate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        mp3: base64Data,
                        callback: {} 
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    statusDiv.innerText = "Song enqueued successfully! Hash: " + data.hash.substring(0, 8) + "...";
                    selectedFile = null;
                    uploadText.innerText = "Drag & Drop an MP3 here or click to browse";
                    
                    // Save hash to local storage to track
                    let hashes = JSON.parse(localStorage.getItem('myHashes') || '[]');
                    if (!hashes.includes(data.hash)) {
                        hashes.push(data.hash);
                        localStorage.setItem('myHashes', JSON.stringify(hashes));
                    }

                    fetchQueue();
                    renderMyTracks();
                } else {
                    statusDiv.innerText = "Error: " + (data.error || "Failed to enqueue");
                }
            } catch (err) {
                statusDiv.innerText = "Error: " + err.message;
            }
            uploadBtn.disabled = false;
        }

        async function fetchQueue() {
            try {
                const response = await fetch('/apiv1/queue');
                const data = await response.json();
                
                queueList.innerHTML = '';
                if (data.queue && data.queue.length > 0) {
                    data.queue.forEach(hash => {
                        queueList.innerHTML += `
                            <li class="list-item">
                                <span><span class="hash-text">${hash.substring(0, 8)}...</span> Processing</span>
                                <div class="spinner"></div>
                            </li>`;
                    });
                } else {
                    queueList.innerHTML = '<li class="list-item text-muted">No jobs in queue</li>';
                }
            } catch (err) {
                console.error("Failed to fetch queue", err);
            }
        }

        function renderMyTracks() {
            let hashes = JSON.parse(localStorage.getItem('myHashes') || '[]');
            tracksList.innerHTML = '';

            if (hashes.length === 0) {
                tracksList.innerHTML = '<li class="list-item text-muted">No completed tracks found</li>';
                return;
            }

            hashes.forEach(hash => {
                const parts = ['vocals.mp3', 'bass.mp3', 'drums.mp3', 'other.mp3'];
                let linksHtml = parts.map(p => `<a href="/apiv1/track/${hash}/${p}" target="_blank">${p}</a>`).join('');

                tracksList.innerHTML += `
                    <li class="list-item" style="flex-direction: column; align-items: flex-start;">
                        <strong>Hash: <span class="hash-text">${hash.substring(0, 16)}...</span></strong>
                        <div class="track-links">
                            ${linksHtml}
                        </div>
                    </li>`;
            });
        }

        // Init
        fetchQueue();
        renderMyTracks();
        
        // Auto refresh
        setInterval(fetchQueue, 5000);
    </script>
</body>
</html>
